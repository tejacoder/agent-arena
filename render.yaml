services:
  - type: web
    name: agent-arena
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_PATH
        value: ./data/arena.db
      - key: BCRYPT_ROUNDS
        value: "10"
      - key: RATE_LIMIT_CAPACITY
        value: "10"
      - key: RATE_LIMIT_REFILL
        value: "1"
      - key: ADMIN_API_KEY
        generateValue: true
    healthCheckPath: /health
    autoDeploy: true
